<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure of Spark</title>
    <link rel="icon" type="image/png" href="texture/spark.png">
    <div class="iconn"><a href="index.html"> <img src="texture/Logo.png" class="Logo"> </a> </div>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
        }
        
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('texture/menu_bg.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .Logo {
            position: fixed;
            width: 111px;
            height: 111px;
            left: 2%;
            transition: 0.6s;
            z-index: 100010;
            top: 3%
        }

        .iconn {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 5px solid black;
            border-radius: 55px;
            background-color: #16b836;
            z-index: 100009;
            left: 2%;
            top: 3%
        }

        .Logo:hover {  
            transform: scale(1.6);      
        }
        
        .title {
            font-family: 'Rubik Mono One', sans-serif;
            font-size: 4rem;
            color: #00ff44;
            text-shadow: 0 0 10px #00ff88, 
                         0 0 20px #00ff44,
                         0 0 30px #00aa33;
            margin-bottom: 2rem;
            text-align: center;
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 10px #178c55, 0 0 20px #0d633b, 0 0 30px #0b6c28;
            }
            to {
                text-shadow: 0 0 15px #00ff88, 0 0 25px #00ff44, 0 0 35px #00aa33, 0 0 45px #007722;
            }
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }
        
        .menu-btn {
            padding: 1rem 2.5rem;
            font-size: 1.5rem;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #00ff44;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 68, 0.5);
        }
        
        .menu-btn:hover {
            background: rgba(0, 255, 68, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 68, 0.8);
        }
        
        .social-links {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1.5rem;
        }
        
        .creator {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }
        
        .youtube-btn {
            background: #ff0000;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .youtube-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: rgba(20, 20, 20, 0.95);
            border: 4px solid #00ff44;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 68, 0.3);
        }

        #modalTitle {
            color: #00ff44;
            margin-top: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        #modalText {
            line-height: 1.6;
            font-size: 0.9rem;
            white-space: pre-line;
            margin: 20px 0;
        }

        .close-btn {
            padding: 0.5rem 2rem !important;
            font-size: 1rem !important;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1 class="title">Приключение Искры</h1>
        
        <div class="menu-buttons">
            <button class="menu-btn" id="playBtn" onclick="startGame()">Играть</button>
            <button class="menu-btn" id="controlsBtn" onclick="showControls()">Управление</button>
            <button class="menu-btn" id="aboutBtn" onclick="showAbout()">Об игре</button>
            <button class="menu-btn" onclick="toggleFullscreen()">F11</button>
        </div>
        
        <div class="social-links">
            <a href="https://www.youtube.com/@Mellt-1127" class="youtube-btn" target="_blank">
                <span>YouTube</span>
            </a>
        </div>
        
        <div class="creator">Создатель: Mellt</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="sound/menu_music.mp3" type="audio/mp3">
    </audio>

    <script>
        const bgMusic = document.getElementById('bgMusic');


        const contentRU = {
            controlsTitle: "Управление",
            controlsText: "Управление в игре:\n\nWASD/Стрелки - Движение\nПробел - Прыжок\nЛКМ - Поставить блок\nПКМ - Удалить блок\nR - Открыть/Закрыть крафты\n\nИспользуйте инструменты для добычи блоков!",
            aboutTitle: "Об игре",
            aboutText: "'Приключение Искры' - это 2D песочница в стилистике Майнкрафта!\n\nИсследуйте мир, стройте, разрушайте блоки и помните, дальше больше!\n\nВерсия: 1.127\n\nДата начала разработки: 07.08.2025"
        };

        function startGame() {
            bgMusic.pause();
            document.getElementById('menu').style.opacity = 0;
            setTimeout(() => {
                window.location.href = 'AoS_game.html';
            }, 500);
        }
        
        function showModal(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function showControls() {
            showModal(contentRU.controlsTitle, contentRU.controlsText);
        }

        function showAbout() {
            showModal(contentRU.aboutTitle, contentRU.aboutText);
        }
        
        document.addEventListener('click', () => {
            bgMusic.volume = 0.3;
            bgMusic.play();
        }, { once: true });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert("Ошибка полноэкранного режима\n" + err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle">Заголовок</h2>
        <p id="modalText">Текст описания...</p>
        <button class="menu-btn close-btn" onclick="closeModal()">OK</button>
    </div>
</div>
</body>
</html>
